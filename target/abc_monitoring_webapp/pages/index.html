<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>ABC Monitoring</title>
		<link rel="stylesheet" href="../css/style.css">
		<link href="https://cdn.lineicons.com/4.0/lineicons.css" rel="stylesheet" />
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
	</head>
	<body>
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<div class="container d-flex flex-column">
		<h1 class="title my-5 py-5 rounded " role="button" id="logo">ABC Monitoring</h1>
		<div class="d-flex flex-row">
			<div class="wrapper">
				<aside id="sidebar">
					<div class="d-flex">
						<button class="toggle-btn" type="button">
							<i class="lni lni-grid-alt"></i>
						</button>
						<div class="sidebar-logo">
							<span id="homeSidemenu" role="button">ABC Monitoring</span>
						</div>
					</div>		
				</aside>
			</div>
			<div class="w-100 ms-3">
				<div class="d-flex flex-row mx-3 justify-content-between">
					<div id="dbTitle">
					</div>
					<form class="d-flex" id="searchForm">
						<div id="dropdownContainer"></div>
						<input type="text" class="mx-2" id="searchInput">
						<button class="btn srcButton text-light" type="submit">Search</button>
					</form>

				</div>
				<div id="dbContainer" class="DbResponse"></div>
				<canvas id="myPieChart"></canvas>
				<div id="paginationContainer" class="text-center d-flex justify-content-center"></div>
			</div>
		</div>
	</div>
</body>
<script src="../js/htmlElement.js"></script>
<script src="../js/home.js"></script>
<script src="../js/loadData.js"></script>
<script src="../js/formSearchPost.js"></script>
<script src="../js/htmlTemplate.js"></script>
<script src="../js/responseBodyHtmlTemplate.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</html>
